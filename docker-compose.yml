services:
  # ============================================================================
  # Cosmos DB Emulator
  # ============================================================================
  # Local development database using official Azure Cosmos DB Emulator vNext
  # Emulates SQL API behavior on localhost:8081
  # Uses the multi-architecture vNext image so ARM64 hosts can run it natively
  cosmos-db:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-latest
    container_name: cosmosdb-emulator
    ports:
      - "8081:8081"  # Cosmos DB endpoint
      - "8080:8080"  # Health probes
      - "1234:1234"  # Data Explorer
    environment:
      # Match api/local.settings.json.example (COSMOS_ENDPOINT=https://localhost:8081)
      PROTOCOL: https
      ENABLE_EXPLORER: 'true'
    volumes:
      # Data persistence for Codespaces reliability
      - cosmos-db-vnext-data:/data
    networks:
      - ZavaGiftExchange-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ready || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 24
      start_period: 15s
    restart: unless-stopped

  # ============================================================================
  # Azurite (Azure Storage Emulator)
  # ============================================================================
  # Local development storage emulating Azure Blob Storage and Queue Storage
  # Useful for testing storage integration (if needed in future)
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: azurite-emulator
    ports:
      - "10000:10000"  # Blob Storage
      - "10001:10001"  # Queue Storage
      - "10002:10002"  # Table Storage
    environment:
      AZURITE_ACCOUNTS: "devstoreaccount1:${AZURITE_KEY:-Eby8vdM02xNOcqFlqUwJPLMRObU1XQEFvgoKj41eZWc=}"
    volumes:
      - azurite-data:/data
    networks:
      - ZavaGiftExchange-network
    healthcheck:
      test: ["CMD-SHELL", "echo '' | nc -w 1 127.0.0.1 10000"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 15s
    restart: unless-stopped

volumes:
  cosmos-db-vnext-data:
    driver: local
  azurite-data:
    driver: local

networks:
  ZavaGiftExchange-network:
    driver: bridge
